version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plate}
      POSTGRES_USER: ${POSTGRES_USER:-plate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-plate}
      POSTGRES_USER: ${POSTGRES_USER:-plate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plate}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DAILY_GOAL_KCAL: ${DAILY_GOAL_KCAL:-2000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./seed_meals.json:/seed_meals.json:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"

volumes:
  postgres_data:
